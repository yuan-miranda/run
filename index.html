<!DOCTYPE html>
<html>

<head>
    <title>run.exe client panel</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="panel" id="app">
        <div class="toolbar">
            <span class="toolbar-title">run.exe // client panel</span>
            <div class="toolbar-right">
                <a href="https://github.com/yuan-miranda/run" target="_blank" class="github-link">
                    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                </a>
                <div class="count-badge-container">
                    <span class="count-badge">online: <span id="online-count">0</span></span>
                    <span class="count-badge">total: <span id="total-count">0</span></span>
                </div>
            </div>
        </div>
        <div class="grid" id="user-grid">
            <div class="empty">initializing connection...</div>
        </div>
    </div>

    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title" id="popup-mode-label">COMMAND</span>
                <span class="popup-target" id="popup-target-label">TARGET_USER</span>
            </div>
    
            <textarea class="popup-input" id="popup-input" rows="4" placeholder="Enter payload or text..."></textarea>
    
            <div id="vis-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="vis-true" tabindex="-1">Visible</button>
                <button class="opt-btn" id="vis-false" tabindex="-1">Hidden</button>
                <span class="btn-hint">SHIFT</span>
            </div>
    
            <div id="voice-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="voice-david" tabindex="-1">David</button>
                <button class="opt-btn" id="voice-zira" tabindex="-1">Zira</button>
                <span class="btn-hint">SHIFT</span>
    
            </div>
            <div id="voice-config" style="display: flex;" class="option-column">
                <div id="config-volume">
                    <span class="hint">VOL</span>
                    <span id="volume-value">100%</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="100" class="slider">
    
                </div>
                <div id="config-speed">
                    <span class="hint">SPD</span>
                    <span id="speed-value">0</span>
                    <input type="range" id="speed-slider" min="-10" max="10" value="0" class="slider">
                </div>
                <div id="config-pitch">
<!-- six seven-->
                    <span class="hint">PIT</span>
                    <span id="pitch-value">0</span>
                    <input type="range" id="pitch-slider" min="-10" max="10" value="0" class="slider">
                </div>
            </div>
    
            <div class="popup-footer">
                <div class="popup-actions">
                    <button class="popup-btn" id="popup-cancel">
                        Cancel <span class="btn-hint">ESC</span>
                    </button>
                    <button class="popup-btn confirm" id="popup-confirm">
                        Send <span class="btn-hint">CTRL+ENTER</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
